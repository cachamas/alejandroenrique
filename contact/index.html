<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Alejandro Enrique</title>
    <link rel="icon" href="../images/logo/header.webp" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 3rem 1.25rem;
      }

      .contact-grid {
        max-width: 760px;
        width: auto;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(520px, 360px) minmax(240px, 300px);
        justify-content: center;
        gap: 1.5rem;
        align-items: start;
      }

      .contact-image img {
        width: 100%;
        display: block;
        object-fit: cover;
        border-radius: 0;
        box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      }

      .placeholder-panel {
        max-width: 720px;
        width: 100%;
        padding: 0;
        border-radius: 0;
        background: transparent;
        border: 0;
        box-shadow: none;
        text-align: left;
      }

      .placeholder-panel p {
        font-family: "Avenir Next", "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: clamp(1rem, 1.6vw, 1.15rem);
        line-height: 1.8;
        margin: 0 0 0.8rem;
        color: #ece7dd;
      }

      .placeholder-panel a {
        color: #8fb9ff;
        text-decoration: underline;
      }

      @media (max-width: 820px) {
        .contact-grid {
          grid-template-columns: 1fr;
          justify-items: center;
        }

        .placeholder-panel {
          text-align: center;
        }

        .placeholder-panel p {
          margin-bottom: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand-stack">
        <a class="brand" href="../" aria-label="Home">
          <img src="../images/logo/header.webp" alt="Alejandro Enrique logo" />
        </a>
        <a class="back-home-link" href="../" aria-label="Back to homepage">← BACK</a>
      </div>
      <nav class="nav-links" aria-label="Primary">
        <a href="./">CONTACT</a>
        <a href="../about/">ABOUT ME</a>
        <a href="https://gov.info.ve" target="_blank" rel="noopener noreferrer">FULL PORTFOLIO →</a>
      </nav>
    </header>

    <main>
      <section class="contact-grid" aria-label="Contact content">
        <aside class="contact-image">
          <img src="../images/artwork/indios.webp" alt="Indios artwork">
        </aside>
        <div class="placeholder-panel" aria-label="Contact details">
          <p><a href="mailto:dm@hombrechivo.com?subject=inquiries%20about%20ART&body=%2B584248654333%0Adiscord.gg/fQnuGdDn%0AAlejandro">E-MAIL →</a></p>
          <p><a href="https://discord.com/users/279083978122854400" target="_blank" rel="noopener noreferrer">DISCORD →</a></p>
          <p><a href="https://www.instagram.com/gob.ve/" target="_blank" rel="noopener noreferrer">INSTAGRAM →</a></p>
          <p>+58(424)865-4333</p>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 Alejandro Enrique</p>
    </footer>
  </body>
</html>
